services:
  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: University Rooms Dashboard API
      DATABASE_URL: ${DATABASE_URL:-}
      DEMO_MODE: ${DEMO_MODE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
